<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラス予約システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .slot { border: 1px solid #dee2e6; padding: 15px; border-radius: 5px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .slot:hover { background-color: #e9ecef; }
        .slot.selected { border-color: #0d6efd; background-color: #e7f1ff; }
        .slot.disabled { background-color: #e9ecef; color: #6c757d; cursor: not-allowed; opacity: 0.6; }
    </style>
</head>
<body>
<div class="container mt-5">
    <h2 class="text-center mb-4">クラス予約</h2>
    
    <div id="status" class="alert alert-info text-center d-none">データを読み込み中...</div>

    <form id="resForm">
        <div class="mb-4">
            <label class="form-label fw-bold">1. 日付を選択してください</label>
            <select id="resDate" class="form-select" required>
                <option value="">選択してください</option>
            </select>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">2. クラスを選択してください</label>
            <div class="d-flex gap-2">
                <input type="radio" class="btn-check" name="className" id="classA" value="A" required checked>
                <label class="btn btn-outline-primary w-50" for="classA">Aクラス</label>
                <input type="radio" class="btn-check" name="className" id="classB" value="B">
                <label class="btn btn-outline-primary w-50" for="classB">Bクラス</label>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">3. 時間帯を選択してください（残り数）</label>
            <div id="timeSlots">
                </div>
        </div>

        <hr class="my-4">

        <div class="mb-4">
            <label class="form-label fw-bold">4. ご予約者情報を入力してください</label>
            
            <div class="mb-3">
                <label class="form-label">お名前</label>
                <input type="text" id="resName" class="form-control" required placeholder="山田 太郎">
            </div>

            <div class="mb-3">
                <label class="form-label">メールアドレス（予約完了メールが届きます）</label>
                <input type="email" id="resEmail" class="form-control" required placeholder="example@gmail.com">
            </div>

            <div class="mb-3">
                <label class="form-label">当日の昼食</label>
                <select id="resLunch" class="form-select" required>
                    <option value="必要">必要</option>
                    <option value="不要">不要</option>
                </select>
            </div>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary w-100 py-2 fw-bold" disabled>予約を確定する</button>
    </form>
</div>

<script>
    // ⚠️【超重要】あなたのGoogle GASのURLをここに貼り付けてください！
    const APP_URL = "https://script.google.com/macros/s/AKfycbynOpCMUSdmgn-BFBS-bMh42nTeKqhhptkXTKRMpeJoj2i1gRqMzZ36KH6jmZBV5gIH/exec";

    let serverData = { dates: [], times: [], reservations: [] };
    let selectedTime = "";

    async function loadData() {
        showStatus("データを読み込み中...");
        try {
            const res = await fetch(APP_URL);
            serverData = await res.json();
            initDates();
            showStatus("");
        } catch(e) { showStatus("データの読み込みに失敗しました", true); }
    }

    function initDates() {
        const select = document.getElementById('resDate');
        select.innerHTML = '<option value="">選択してください</option>';
        serverData.dates.forEach(d => {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = d;
            select.appendChild(opt);
        });
    }

    function updateSlots() {
        const date = document.getElementById('resDate').value;
        const className = document.querySelector('input[name="className"]:checked').value;
        const container = document.getElementById('timeSlots');
        container.innerHTML = "";
        selectedTime = "";
        document.getElementById('submitBtn').disabled = true;

        if(!date) return;

        serverData.times.forEach(t => {
            // スプレッドシート側のデータ（時差リセット済みの文字）と純粋に比較
            const booked = serverData.reservations.filter(r => {
                const rDate = r.date.includes('T') ? r.date.split('T')[0] : r.date;
                return rDate === date && r.className === className && r.time === t;
            }).length;

            const remains = Math.max(0, 3 - booked); // 1枠3名まで
            const div = document.createElement('div');
            div.className = `slot ${remains === 0 ? 'disabled' : ''}`;
            div.innerHTML = `<strong>${t}</strong> <span class="badge ${remains > 0 ? 'bg-success' : 'bg-danger'} float-end">残り ${remains} 枠</span>`;
            
            if(remains > 0) {
                div.onclick = () => {
                    document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedTime = t;
                    document.getElementById('submitBtn').disabled = false;
                };
            }
            container.appendChild(div);
        });
    }

    document.getElementById('resDate').onchange = updateSlots;
    document.querySelectorAll('input[name="className"]').forEach(r => r.onchange = updateSlots);

    document.getElementById('resForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        showStatus("予約を送信中...");

        const resData = {
            action: 'addReservation',
            date: document.getElementById('resDate').value,
            className: document.querySelector('input[name="className"]:checked').value,
            time: selectedTime,
            name: document.getElementById('resName').value,
            lunch: document.getElementById('resLunch').value,
            email: document.getElementById('resEmail').value
        };

        try {
            await fetch(APP_URL, { method: 'POST', body: JSON.stringify(resData) });
            alert('ご予約ありがとうございました！メールをご確認ください。');
            location.reload();
        } catch(e) {
            showStatus("予約に失敗しました。もう一度お試しください。", true);
            btn.disabled = false;
        }
    };

    function showStatus(msg, isError = false) {
        const div = document.getElementById('status');
        if(!msg) { div.classList.add('d-none'); return; }
        div.className = `alert ${isError ? 'alert-danger' : 'alert-info'} text-center`;
        div.textContent = msg;
        div.classList.remove('d-none');
    }

    loadData();
</script>
</body>
</html>
